apiVersion: v1
kind: Application
metadata:
  name: battery-diagnostic
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: battery-diagnostic
          image: battery-diagnostic:latest
          ports:
            - containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: CORS_ORIGIN
              value: "*"
            - name: PERSISTENCE_MODE
              value: file
            - name: STORAGE_DIR
              value: /tmp/platform
            - name: VITE_APP_TITLE
              value: 锂电池企业智能诊断系统
            - name: VITE_API_BASE_URL
              value: /api
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
