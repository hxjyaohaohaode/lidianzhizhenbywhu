services:
  - type: web
    name: battery-diagnostic
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: node dist/src/server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: PORT
        value: 10000
      - key: PERSISTENCE_MODE
        value: file
      - key: STORAGE_DIR
        value: /tmp/platform
      - key: VITE_APP_TITLE
        value: 锂电池企业智能诊断系统
      - key: VITE_API_BASE_URL
        value: /api
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1
      - key: GLM_API_KEY
        sync: false
      - key: GLM_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
